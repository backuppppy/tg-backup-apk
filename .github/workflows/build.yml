name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev \
            liblzma-dev uuid-dev

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-

      - name: Install buildozer
        run: pip install buildozer cython pillow

      - name: Build APK
        run: |
          # Save keystore before buildozer can overwrite it
          cp debug.keystore /tmp/repo-debug.keystore
          buildozer android debug

      - name: Inject custom launcher icon and re-sign with fixed key
        run: |
          BT=$(ls ~/.buildozer/android/platform/android-sdk/build-tools/ | sort -V | tail -1)
          BT_PATH=~/.buildozer/android/platform/android-sdk/build-tools/$BT
          APK=$(ls bin/*.apk | head -1)

          # Replace ic_launcher with custom logo
          python3 << 'PYEOF'
          import glob, os, io, zipfile
          from PIL import Image

          apk = glob.glob('bin/*.apk')[0]
          icon = Image.open('icon.png').convert('RGBA')

          sizes = {
              'res/drawable-mdpi-v4/ic_launcher.png':   48,
              'res/drawable-hdpi-v4/ic_launcher.png':   72,
              'res/drawable-xhdpi-v4/ic_launcher.png':  96,
              'res/drawable-xxhdpi-v4/ic_launcher.png': 144,
          }
          new_icons = {}
          for name, size in sizes.items():
              buf = io.BytesIO()
              icon.resize((size, size), Image.LANCZOS).save(buf, 'PNG')
              new_icons[name] = buf.getvalue()
              print(f'Icon {size}x{size}: {len(new_icons[name])} bytes')

          tmp = '/tmp/patched.apk'
          with zipfile.ZipFile(apk, 'r') as zin, \
               zipfile.ZipFile(tmp, 'w', zipfile.ZIP_DEFLATED) as zout:
              for info in zin.infolist():
                  if info.filename.startswith('META-INF/'):
                      continue
                  data = new_icons.get(info.filename, zin.read(info.filename))
                  zout.writestr(info, data)
          os.replace(tmp, apk)
          print(f'Patched: {apk}')
          PYEOF

          # Zipalign
          $BT_PATH/zipalign -f 4 "$APK" /tmp/aligned.apk

          # Sign with fixed debug keystore from repo (consistent across builds)
          $BT_PATH/apksigner sign \
            --ks /tmp/repo-debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out "$APK" \
            /tmp/aligned.apk

          echo "Done: $APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tg-backup-debug
          path: bin/tgbackup-*.apk
