<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>TG Backup</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#0f1117;--surface:#1a1d2e;--border:#2a2d3e;--input:#12151f;
    --blue:#2979ff;--green:#00c853;--red:#c62828;--orange:#e65100;--teal:#006064;
    --text:#e0e0e0;--muted:#888;--accent:#82b1ff;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);
    font-family:'Segoe UI',Arial,sans-serif;font-size:14px;}

  /* ── header ── */
  header{background:var(--surface);padding:0 16px;height:52px;display:flex;
    align-items:center;gap:10px;border-bottom:2px solid var(--blue);
    position:sticky;top:0;z-index:10;}
  header h1{font-size:1.1rem;color:var(--accent);flex:1}
  #dot{width:11px;height:11px;border-radius:50%;background:var(--muted);
    transition:background .3s,box-shadow .3s;flex-shrink:0}
  #dot.on{background:#00e676;box-shadow:0 0 8px #00e67688}
  #dot.pause{background:#ffd740;box-shadow:0 0 8px #ffd74088}

  /* ── controls bar ── */
  #ctrl{background:#13161f;border-bottom:1px solid var(--border);
    padding:8px 12px;display:flex;gap:8px;flex-wrap:wrap}
  button{padding:8px 16px;border-radius:6px;border:none;cursor:pointer;
    font-weight:600;font-size:13px;transition:filter .15s}
  button:active{filter:brightness(.8)}
  button:disabled{opacity:.35;cursor:not-allowed}
  #bStart {background:var(--green);color:#000}
  #bPause {background:var(--orange);color:#fff}
  #bResume{background:var(--teal);color:#fff}
  #bStop  {background:var(--red);color:#fff}
  #bSave  {background:var(--blue);color:#fff;margin-right:auto}

  /* ── tabs ── */
  .tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface)}
  .tab{padding:10px 18px;cursor:pointer;color:var(--muted);font-weight:600;
    border-bottom:2px solid transparent;transition:color .2s}
  .tab.active{color:var(--accent);border-color:var(--blue)}

  .panel{display:none;padding:14px}
  .panel.active{display:block}

  /* ── form elements ── */
  .field{margin-bottom:12px}
  label{display:block;font-size:.75rem;color:var(--accent);margin-bottom:4px}
  input{width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--border);
    background:var(--input);color:var(--text);font-size:13px}
  input:focus{outline:none;border-color:var(--blue)}
  input[type=password]{letter-spacing:2px}

  /* ── accounts ── */
  .acc-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .atab{padding:5px 14px;border-radius:20px;border:1px solid var(--border);
    background:var(--input);cursor:pointer;font-size:.82rem;color:var(--muted)}
  .atab.active{border-color:var(--blue);color:var(--accent);background:#2979ff14}
  .apanel{display:none}.apanel.active{display:block}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:500px){.grid2{grid-template-columns:1fr}}

  .acc-btns{display:flex;gap:8px;margin-bottom:10px}
  .sm{padding:6px 12px;font-size:.8rem}
  .btn-add{background:#1b5e20;color:#fff}
  .btn-del{background:var(--red);color:#fff}

  /* ── progress ── */
  .info-box{background:var(--surface);border-radius:8px;padding:12px;margin-bottom:12px;
    border:1px solid var(--border)}
  .info-box strong{color:var(--accent)}
  .big-num{font-size:1.4rem;font-weight:700;color:#00e676;font-family:monospace}

  /* ── log ── */
  #log{background:#0a0c12;border-radius:8px;padding:10px;height:320px;
    overflow-y:auto;font-family:monospace;font-size:.78rem}
  .ll{padding:1px 0;line-height:1.5}
  .ll .ts{color:#444;margin-left:6px}
  .ll.success{color:#00e676}.ll.error{color:#ff5252}
  .ll.warn{color:#ffd740}.ll.info{color:#82b1ff}
  #logBar{display:flex;gap:8px;margin-bottom:6px;align-items:center}
  #logCount{font-size:.75rem;color:var(--muted);flex:1}
</style>
</head>
<body>

<header>
  <div id="dot"></div>
  <h1>TG Backup</h1>
  <span id="statusText" style="font-size:.8rem;color:var(--muted)">Stopped</span>
</header>

<div id="ctrl">
  <button id="bSave"   onclick="saveConfig()">💾 Save</button>
  <button id="bStart"  onclick="startBot()">▶ Start</button>
  <button id="bPause"  onclick="pauseBot()">⏸ Pause</button>
  <button id="bResume" onclick="resumeBot()">▶ Resume</button>
  <button id="bStop"   onclick="stopBot()">■ Stop</button>
</div>

<!-- ── Tabs ── -->
<div class="tabs">
  <div class="tab active" onclick="switchTab(0)">Accounts</div>
  <div class="tab" onclick="switchTab(1)">Channels</div>
  <div class="tab" onclick="switchTab(2)">Logs</div>
</div>

<!-- Accounts -->
<div class="panel active" id="p0">
  <div class="acc-btns">
    <button class="sm btn-add" onclick="addAccount()">＋ Add</button>
    <button class="sm btn-del" onclick="delAccount()">✕ Remove</button>
  </div>
  <div class="acc-tabs" id="accTabs"></div>
  <div id="accPanels"></div>
</div>

<!-- Channels -->
<div class="panel" id="p1">
  <div class="field">
    <label>Source Chat ID (channel to copy FROM)</label>
    <input id="src" type="text" placeholder="-1001234567890">
  </div>
  <div class="field">
    <label>Target Chat ID (channel to copy TO)</label>
    <input id="tgt" type="text" placeholder="-1009876543210">
  </div>
  <div class="info-box">
    <strong>Last Processed Message:</strong><br>
    <span class="big-num" id="lastIdVal">0</span>
    <button class="sm btn-del" style="margin-right:8px;margin-top:6px"
      onclick="resetLastId()">Reset to 0</button>
  </div>
</div>

<!-- Logs -->
<div class="panel" id="p2">
  <div id="logBar">
    <span id="logCount">0 lines</span>
    <button class="sm" onclick="clearLogs()">Clear</button>
  </div>
  <div id="log"></div>
</div>

<script>
// ── state ─────────────────────────────────────────────────────────────────────
const cfg = {{ config|tojson }};
let accounts = cfg.accounts || [];
let logCount = 0;
let activeAccIdx = 0;
let activeTabIdx = 0;

// ── init ──────────────────────────────────────────────────────────────────────
function init() {
  document.getElementById('src').value = cfg.source_chat_id || '';
  document.getElementById('tgt').value = cfg.target_chat_id || '';
  buildAccUI();
  pollStatus();
  setInterval(pollStatus, 2500);
  connectSSE();
}

// ── tabs ──────────────────────────────────────────────────────────────────────
function switchTab(i) {
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===i));
  document.querySelectorAll('.panel').forEach((p,j)=>p.classList.toggle('active',j===i));
  activeTabIdx = i;
}

// ── accounts UI ───────────────────────────────────────────────────────────────
function buildAccUI() {
  const tabs = document.getElementById('accTabs');
  const panels = document.getElementById('accPanels');
  tabs.innerHTML = ''; panels.innerHTML = '';

  if (!accounts.length) {
    panels.innerHTML = '<p style="color:var(--muted);padding:10px">No accounts yet. Click + Add.</p>';
    return;
  }

  accounts.forEach((a, i) => {
    const t = document.createElement('div');
    t.className = 'atab' + (i === activeAccIdx ? ' active' : '');
    t.textContent = a.client_name || `Acc ${i+1}`;
    t.onclick = () => switchAcc(i);
    tabs.appendChild(t);

    const p = document.createElement('div');
    p.className = 'apanel' + (i === activeAccIdx ? ' active' : '');
    p.id = `ap${i}`;
    p.innerHTML = `
      <div class="grid2">
        <div class="field"><label>Client Name</label>
          <input id="cn${i}" value="${a.client_name||''}" oninput="syncAccTab(${i})"></div>
        <div class="field"><label>Phone (972...)</label>
          <input id="ph${i}" value="${a.phone_number||''}"></div>
        <div class="field"><label>API ID</label>
          <input id="ai${i}" value="${a.api_id||''}"></div>
        <div class="field"><label>API Hash</label>
          <input id="ah${i}" type="password" value="${a.api_hash||''}"></div>
      </div>`;
    panels.appendChild(p);
  });
}

function switchAcc(i) {
  activeAccIdx = i;
  document.querySelectorAll('.atab').forEach((t,j)=>t.classList.toggle('active',j===i));
  document.querySelectorAll('.apanel').forEach((p,j)=>p.classList.toggle('active',j===i));
}

function syncAccTab(i) {
  const tabs = document.querySelectorAll('.atab');
  if (tabs[i]) tabs[i].textContent = document.getElementById(`cn${i}`)?.value || `Acc ${i+1}`;
}

function addAccount() {
  accounts.push({client_name:`account${accounts.length+1}`,phone_number:'',api_id:'',api_hash:''});
  activeAccIdx = accounts.length - 1;
  buildAccUI();
}

function delAccount() {
  if (!accounts.length) return;
  accounts.splice(activeAccIdx, 1);
  activeAccIdx = Math.max(0, activeAccIdx - 1);
  buildAccUI();
}

// ── gather config ─────────────────────────────────────────────────────────────
function gatherConfig() {
  const accs = accounts.map((_, i) => ({
    client_name: document.getElementById(`cn${i}`)?.value.trim() || `account${i+1}`,
    phone_number: document.getElementById(`ph${i}`)?.value.trim() || '',
    api_id:       document.getElementById(`ai${i}`)?.value.trim() || '',
    api_hash:     document.getElementById(`ah${i}`)?.value.trim() || '',
  }));
  return {
    accounts: accs,
    source_chat_id: document.getElementById('src').value.trim(),
    target_chat_id: document.getElementById('tgt').value.trim(),
  };
}

async function saveConfig() {
  const c = gatherConfig();
  accounts = c.accounts;
  await fetch('/config', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(c)});
  addLog({time:now(), level:'success', msg:'Config saved.'});
}

// ── controls ──────────────────────────────────────────────────────────────────
async function startBot()  { await saveConfig(); const r=await(await fetch('/start',{method:'POST'})).json(); if(!r.ok) addLog({time:now(),level:'error',msg:r.msg}); }
async function stopBot()   { await fetch('/stop',  {method:'POST'}); }
async function pauseBot()  { await fetch('/pause',  {method:'POST'}); }
async function resumeBot() { await fetch('/resume', {method:'POST'}); }

async function resetLastId() {
  await fetch('/config', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({...gatherConfig(), _reset_last_id: true})});
  // just zero the display; server doesn't need to handle it specially
  document.getElementById('lastIdVal').textContent = '0';
}

// ── status polling ────────────────────────────────────────────────────────────
async function pollStatus() {
  try {
    const s = await (await fetch('/status')).json();
    const lid = await (await fetch('/last_id')).json();
    applyStatus(s.running, s.paused);
    if (lid.last_id) document.getElementById('lastIdVal').textContent = lid.last_id;
  } catch {}
}

function applyStatus(running, paused) {
  const dot  = document.getElementById('dot');
  const txt  = document.getElementById('statusText');
  dot.className = running ? (paused ? 'pause' : 'on') : '';
  txt.textContent = running ? (paused ? 'Paused' : 'Running') : 'Stopped';

  document.getElementById('bStart').disabled  = running;
  document.getElementById('bStop').disabled   = !running;
  document.getElementById('bPause').disabled  = !running || paused;
  document.getElementById('bResume').disabled = !running || !paused;
}

// ── SSE logs ──────────────────────────────────────────────────────────────────
function connectSSE() {
  const es = new EventSource('/logs');
  es.onmessage = e => { try { addLog(JSON.parse(e.data)); } catch{} };
  es.onerror = () => setTimeout(connectSSE, 3000);
}

function addLog(entry) {
  if (entry.ping) return;
  const box = document.getElementById('log');
  const line = document.createElement('div');
  line.className = `ll ${entry.level||'info'}`;
  line.innerHTML = `<span class="ts">${entry.time}</span>${entry.msg}`;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
  logCount++;
  document.getElementById('logCount').textContent = `${logCount} lines`;
}

function clearLogs() {
  document.getElementById('log').innerHTML = '';
  logCount = 0;
  document.getElementById('logCount').textContent = '0 lines';
}

function now() { return new Date().toTimeString().slice(0,8); }

init();
</script>
</body>
</html>
